name: CI - Express Server

on:
  push:
    branches: [mobile, main]
  pull_request:
    branches: [mobile, main]

defaults:
  run:
    working-directory: server

jobs:
  lint:
    name: ESLint Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

  typecheck:
    name: TypeScript Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run type check
        run: npx tsc --noEmit

  test:
    name: Server Tests
    runs-on: ubuntu-latest
    needs: [lint, typecheck]
    env:
      DATABASE_URL: file:./test.db
      JWT_SECRET: ci-test-secret
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run migrations (SQLite)
        run: npx prisma migrate dev --name ci-test
        env:
          DATABASE_URL: file:./test.db

      - name: Run tests
        run: npm test -- --forceExit --detectOpenHandles
