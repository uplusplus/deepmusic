<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DeepMusic 乐谱上传</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
  .container { background: white; border-radius: 16px; padding: 32px; width: 100%; max-width: 480px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); }
  h1 { font-size: 24px; margin-bottom: 24px; text-align: center; }
  h1 span { font-size: 28px; }
  .login-form, .upload-form { display: flex; flex-direction: column; gap: 16px; }
  label { font-size: 14px; font-weight: 600; color: #333; }
  input, select { padding: 10px 14px; border: 1px solid #ddd; border-radius: 8px; font-size: 15px; outline: none; transition: border-color 0.2s; }
  input:focus, select:focus { border-color: #6366f1; }
  .file-area { border: 2px dashed #ccc; border-radius: 12px; padding: 32px; text-align: center; cursor: pointer; transition: all 0.2s; background: #fafafa; }
  .file-area:hover, .file-area.dragover { border-color: #6366f1; background: #f0f0ff; }
  .file-area p { color: #888; font-size: 14px; margin-top: 8px; }
  .file-area .icon { font-size: 36px; }
  .file-name { color: #6366f1; font-weight: 600; margin-top: 8px; }
  button { padding: 12px; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
  .btn-primary { background: #6366f1; color: white; }
  .btn-primary:hover { background: #4f46e5; }
  .btn-primary:disabled { background: #a5a5a5; cursor: not-allowed; }
  .btn-secondary { background: #eee; color: #333; }
  .btn-secondary:hover { background: #ddd; }
  .msg { padding: 12px; border-radius: 8px; font-size: 14px; display: none; }
  .msg.success { display: block; background: #dcfce7; color: #166534; }
  .msg.error { display: block; background: #fef2f2; color: #991b1b; }
  .hidden { display: none !important; }
  .score-list { margin-top: 24px; border-top: 1px solid #eee; padding-top: 16px; }
  .score-list h3 { font-size: 16px; margin-bottom: 12px; }
  .score-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid #f0f0f0; font-size: 14px; }
  .score-item .title { font-weight: 500; }
  .score-item .meta { color: #888; font-size: 12px; }
  .logout { margin-top: 16px; text-align: center; }
  .logout a { color: #888; font-size: 13px; text-decoration: none; }
  .logout a:hover { color: #6366f1; }
</style>
</head>
<body>
<div class="container">
  <h1><span>🎵</span> DeepMusic 乐谱上传</h1>

  <div id="loginSection">
    <div class="login-form">
      <div>
        <label>邮箱</label>
        <input type="email" id="email" placeholder="your@email.com">
      </div>
      <div>
        <label>密码</label>
        <input type="password" id="password" placeholder="密码">
      </div>
      <div id="loginMsg" class="msg"></div>
      <button class="btn-primary" onclick="login()">登录</button>
    </div>
  </div>

  <div id="uploadSection" class="hidden">
    <div class="upload-form">
      <div>
        <label>乐谱标题</label>
        <input type="text" id="title" placeholder="如：致爱丽丝">
      </div>
      <div>
        <label>作曲家</label>
        <input type="text" id="composer" placeholder="如：贝多芬">
      </div>
      <div>
        <label>难度</label>
        <select id="difficulty">
          <option value="BEGINNER">初级</option>
          <option value="INTERMEDIATE">中级</option>
          <option value="ADVANCED">高级</option>
        </select>
      </div>
      <div class="file-area" id="fileArea" onclick="document.getElementById('fileInput').click()">
        <div class="icon">📄</div>
        <p>点击选择或拖拽 MusicXML 文件</p>
        <p style="font-size:12px;color:#aaa">支持 .xml / .musicxml / .mxl</p>
        <div class="file-name" id="fileName"></div>
      </div>
      <input type="file" id="fileInput" accept=".xml,.musicxml,.mxl" style="display:none" onchange="onFileSelect(this)">
      <div id="uploadMsg" class="msg"></div>
      <button class="btn-primary" id="uploadBtn" onclick="upload()">上传</button>
    </div>

    <div class="score-list">
      <h3>📚 已有乐谱</h3>
      <div id="scoreList">加载中...</div>
    </div>
    <div class="logout"><a href="#" onclick="logout()">退出登录</a></div>
  </div>
</div>

<script>
const API = window.location.origin + '/api';
let token = localStorage.getItem('dm_token');

// 拖拽
const fileArea = document.getElementById('fileArea');
fileArea.addEventListener('dragover', e => { e.preventDefault(); fileArea.classList.add('dragover'); });
fileArea.addEventListener('dragleave', () => fileArea.classList.remove('dragover'));
fileArea.addEventListener('drop', e => {
  e.preventDefault();
  fileArea.classList.remove('dragover');
  if (e.dataTransfer.files.length) {
    document.getElementById('fileInput').files = e.dataTransfer.files;
    onFileSelect(document.getElementById('fileInput'));
  }
});

function showMsg(el, msg, type) {
  el.textContent = msg;
  el.className = 'msg ' + type;
}

function onFileSelect(input) {
  if (input.files.length) {
    document.getElementById('fileName').textContent = input.files[0].name;
  }
}

async function login() {
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;
  const msgEl = document.getElementById('loginMsg');
  try {
    const res = await fetch(API + '/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });
    const data = await res.json();
    if (data.success) {
      token = data.data.token;
      localStorage.setItem('dm_token', token);
      showSection();
      loadScores();
    } else {
      showMsg(msgEl, data.error || '登录失败', 'error');
    }
  } catch (e) {
    showMsg(msgEl, '网络错误: ' + e.message, 'error');
  }
}

function logout() {
  token = null;
  localStorage.removeItem('dm_token');
  document.getElementById('loginSection').classList.remove('hidden');
  document.getElementById('uploadSection').classList.add('hidden');
}

async function upload() {
  const file = document.getElementById('fileInput').files[0];
  const title = document.getElementById('title').value;
  const composer = document.getElementById('composer').value;
  const difficulty = document.getElementById('difficulty').value;
  const msgEl = document.getElementById('uploadMsg');
  const btn = document.getElementById('uploadBtn');

  if (!file) return showMsg(msgEl, '请选择文件', 'error');
  if (!title) return showMsg(msgEl, '请填写标题', 'error');
  if (!composer) return showMsg(msgEl, '请填写作曲家', 'error');

  btn.disabled = true;
  btn.textContent = '上传中...';

  const fd = new FormData();
  fd.append('file', file);
  fd.append('title', title);
  fd.append('composer', composer);
  fd.append('difficulty', difficulty);

  try {
    const res = await fetch(API + '/scores', {
      method: 'POST',
      headers: { 'Authorization': 'Bearer ' + token },
      body: fd
    });
    const data = await res.json();
    if (data.success) {
      showMsg(msgEl, '✅ 上传成功: ' + data.data.title, 'success');
      document.getElementById('title').value = '';
      document.getElementById('composer').value = '';
      document.getElementById('fileName').textContent = '';
      document.getElementById('fileInput').value = '';
      loadScores();
    } else {
      showMsg(msgEl, data.error || '上传失败', 'error');
    }
  } catch (e) {
    showMsg(msgEl, '网络错误: ' + e.message, 'error');
  }
  btn.disabled = false;
  btn.textContent = '上传';
}

async function loadScores() {
  try {
    const res = await fetch(API + '/scores?page=1&limit=50', {
      headers: { 'Authorization': 'Bearer ' + token }
    });
    const data = await res.json();
    const el = document.getElementById('scoreList');
    if (data.success && data.data.length) {
      el.innerHTML = data.data.map(s =>
        `<div class="score-item">
          <div><div class="title">${s.title}</div><div class="meta">${s.composer} · ${s.difficulty}</div></div>
        </div>`
      ).join('');
    } else {
      el.innerHTML = '<p style="color:#888">暂无乐谱</p>';
    }
  } catch (e) {
    document.getElementById('scoreList').innerHTML = '<p style="color:red">加载失败</p>';
  }
}

function showSection() {
  document.getElementById('loginSection').classList.add('hidden');
  document.getElementById('uploadSection').classList.remove('hidden');
}

// 自动登录
if (token) { showSection(); loadScores(); }
</script>
</body>
</html>
