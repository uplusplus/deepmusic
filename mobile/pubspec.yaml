name: deepmusic
description: DeepMusic - 跨平台音乐学习APP
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # 状态管理
  flutter_riverpod: ^2.4.0
  riverpod_annotation: ^2.3.3

  # 网络
  dio: ^5.4.0
  retrofit: ^4.0.3

  # 数据持久化
  hive_flutter: ^1.1.0
  hive: ^2.2.3
  shared_preferences: ^2.2.2

  # MIDI
  flutter_midi_command: ^0.5.2
  # USB OTG (Android only)
  usb_serial: ^0.5.1

  # XML 解析 (MusicXML)
  xml: ^6.3.0

  # UI 组件
  flutter_svg: ^2.0.9
  cached_network_image: ^3.3.0
  shimmer: ^3.0.0

  # 工具
  uuid: ^4.2.1
  intl: ^0.18.1
  path_provider: ^2.1.1
  path: ^1.8.3
  permission_handler: ^11.3.1

  # 日志
  logger: ^2.0.2+1

  # WebView (Phase 1 乐谱渲染)
  webview_flutter: ^4.4.2

  # 音频合成 (内置钢琴音色 fallback)
  dart_melty_soundfont: ^2.0.0
  flutter_pcm_sound: ^1.1.0

  # 图标
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.0
  build_runner: ^2.4.7
  riverpod_generator: ^2.3.9
  riverpod_lint: ^2.3.7
  retrofit_generator: ^8.0.6
  hive_generator: ^2.0.1
  json_serializable: ^6.7.1

flutter:
  uses-material-design: true

  assets:
    - assets/osmd/
    - assets/sf2/
