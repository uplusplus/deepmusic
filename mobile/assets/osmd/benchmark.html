<head>
  <meta charset="UTF-8">
  <title>OSMD Benchmark</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: monospace; background: #1a1a2e; color: #eee; padding: 20px; }
    h1 { color: #e94560; margin-bottom: 16px; }
    #log { white-space: pre-wrap; line-height: 1.6; font-size: 13px; }
    .perf { color: #0f3460; }
    .ok { color: #4ecca3; }
    .warn { color: #e9c46a; }
    .err { color: #e94560; }
    .dim { color: #666; }
    #controls { margin: 16px 0; }
    button { background: #16213e; color: #eee; border: 1px solid #e94560; padding: 8px 16px; margin: 4px; cursor: pointer; font-family: monospace; }
    button:hover { background: #e94560; }
    select { background: #16213e; color: #eee; border: 1px solid #0f3460; padding: 8px; font-family: monospace; }
    #score-container { background: #fff; margin-top: 16px; min-height: 200px; }
  </style>
</head>

  <div id="controls">
    <label>选择测试曲谱: </label>
    <select id="scoreSelect">
      <option value="twinkle_star">小星星 (简单, ~9KB)</option>
      <option value="fur_elise">致爱丽丝 (中等)</option>
      <option value="canon">卡农 (较复杂)</option>
    </select>
    <button onclick="runBenchmark()">▶ 运行测试</button>
    <button onclick="runBenchmark3()">▶ 3次取平均</button>
    <button onclick="clearLog()">🗑 清空日志</button>
  </div>

  <div id="log"></div>
  <div id="score-container"></div>

  <script src="opensheetmusicdisplay.min.js"></script>

    var logEl = document.getElementById('log');
    var osmd = null;
    var results = [];

    function log(msg, cls) {
      var span = document.createElement('span');
      span.className = cls || '';
      span.textContent = msg + '\n';
      logEl.appendChild(span);
      logEl.scrollTop = logEl.scrollHeight;
      console.log(msg);
    }

    function clearLog() {
      logEl.innerHTML = '';
      results = [];
    }

    async function runBenchmark() {
      var name = document.getElementById('scoreSelect').value;
      var xml = testXmls[name];
      if (!xml) {
        // 尝试从本地文件加载
        log('⚠ 内置 XML 不存在，尝试 fetch...', 'warn');
        try {
          var resp = await fetch(name + '.xml');
          xml = await resp.text();
        } catch(e) {
          log('❌ 加载失败: ' + e.message, 'err');
          return;
        }
      }

      var xmlSize = xml.length;
      log('', '');
      log('═══════════════════════════════════════════', 'ok');
      log('▶ 测试: ' + name + '  (' + xmlSize + ' chars)', 'ok');
      log('═══════════════════════════════════════════', 'ok');

      var t0 = performance.now();

      // 初始化 OSMD（仅首次）
      if (!osmd) {
        var container = document.getElementById('score-container');
        container.innerHTML = '';
        osmd = new opensheetmusicdisplay.OpenSheetMusicDisplay(container, {
          autoResize: false,
          drawTitle: true,
          drawSubtitle: false,
          drawComposer: false,
          drawCredits: false,
          pageFormat: 'Endless',
        });
        osmd.setLogLevel('WARN');
        var t_init = performance.now();
        log('  OSMD init:    ' + (t_init - t0).toFixed(1) + 'ms', 'dim');
        t0 = t_init;
      }

      // ── load ──
      var t1 = performance.now();
      try {
        await osmd.load(xml);
      } catch(e) {
        log('❌ load 失败: ' + e.message, 'err');
        return;
      }
      var t2 = performance.now();
      var loadMs = t2 - t1;
      log('  T_osmd_load:  ' + loadMs.toFixed(1) + 'ms', loadMs > 300 ? 'warn' : 'ok');

      // ── render ──
      var t3 = performance.now();
      try {
        await osmd.render();
      } catch(e) {
        log('❌ render 失败: ' + e.message, 'err');
        return;
      }
      var t4 = performance.now();
      var renderMs = t4 - t3;
      log('  T_osmd_render:' + renderMs.toFixed(1) + 'ms', renderMs > 300 ? 'warn' : 'ok');

      // ── collect positions ──
      var t5 = performance.now();
      var measures = osmd.Sheet ? osmd.Sheet.SourceMeasures.length : 0;
      var svg = container.querySelector('svg');
      var svgW = svg ? svg.getBoundingClientRect().width.toFixed(0) : '?';
      var svgH = svg ? svg.getBoundingClientRect().height.toFixed(0) : '?';
      var svgNodes = svg ? svg.querySelectorAll('*').length : 0;
      var t6 = performance.now();

      log('  T_collect:    ' + (t6 - t5).toFixed(1) + 'ms', 'dim');
      log('───────────────────────────────────────────', 'dim');
      log('  TOTAL:        ' + (t4 - t0).toFixed(1) + 'ms', 'ok');
      log('  measures:     ' + measures, 'dim');
      log('  SVG:          ' + svgW + ' x ' + svgH + '  (' + svgNodes + ' nodes)', 'dim');
      log('═══════════════════════════════════════════', 'ok');

      results.push({ name, xmlSize, loadMs, renderMs, total: t4 - t0, measures, svgNodes });
    }

    async function runBenchmark3() {
      clearLog();
      log('🔄 连续测试 3 次取平均...\n', 'warn');
      for (var i = 0; i < 3; i++) {
        log('--- Round ' + (i+1) + ' ---', 'dim');
        await runBenchmark();
        await new Promise(r => setTimeout(r, 500)); // 间隔 500ms
      }

      // 计算平均值
      if (results.length >= 3) {
        var last3 = results.slice(-3);
        var avgLoad = last3.reduce((s,r) => s + r.loadMs, 0) / 3;
        var avgRender = last3.reduce((s,r) => s + r.renderMs, 0) / 3;
        var avgTotal = last3.reduce((s,r) => s + r.total, 0) / 3;
        log('', '');
        log('═══════════════════════════════════════════', 'warn');
        log('📊 3 次平均:', 'warn');
        log('  load:   ' + avgLoad.toFixed(1) + 'ms', 'warn');
        log('  render: ' + avgRender.toFixed(1) + 'ms', 'warn');
        log('  total:  ' + avgTotal.toFixed(1) + 'ms', 'warn');
        log('═══════════════════════════════════════════', 'warn');
      }
    }
  </script>
